<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="oklch(0.145 0 0)"/>
  <g opacity="0.04">
    <rect x="0" y="0" width="1200" height="630" fill="url(#grid)"/>
  </g>
  <g transform="translate(600,315)" opacity="0.08">
    <circle cx="0" cy="0" r="180" stroke="oklch(0.7 0.15 220)" stroke-width="1"/>
    <circle cx="0" cy="0" r="120" stroke="oklch(0.7 0.15 220)" stroke-width="1"/>
    <circle cx="0" cy="0" r="60" stroke="oklch(0.7 0.15 220)" stroke-width="1"/>
  </g>
  <g transform="translate(600,315)" opacity="0.12">
    <rect x="-200" y="-200" width="400" height="400" stroke="oklch(0.7 0.15 220)" stroke-width="1" fill="none" transform="rotate(45)"/>
  </g>
  <g opacity="0.15">
    <rect x="0" y="0" width="1200" height="630" fill="url(#gradient)"/>
  </g>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="oklch(0.7 0.15 220)" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="oklch(0.7 0.15 220)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
</svg>
